environment:
  delta_time: 5
  min_green: 5
  net_file: network/grid.net.xml
  num_seconds: 3600
  route_file: network/grid.rou.xml
  use_gui: false
  yellow_time: 2
mappo:
  batch_size: 64
  clip_epsilon: 0.17705992987476787
  entropy_coef_start: 0.1       # high at start — forces exploration
  entropy_coef_end: 0.005       # low at end — allows exploitation
  entropy_anneal_episodes: 300  # anneal over first 300 episodes
  gamma: 0.99
  lr_actor: 0.00025493856038648864
  lr_critic: 2.620719565451713e-05
  update_epochs: 3
  value_coef: 0.5
model:
  embedding_dim: 128
  gat_heads: 8
  gat_hidden_dim: 64
  gat_layers: 2
  id_embed_dim: 8      # new
  num_agents: 12 
training:
  episodes: 500
  seed: 42
  update_freq: 512
